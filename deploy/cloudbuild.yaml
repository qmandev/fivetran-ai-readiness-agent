# Build + deploy skeleton. Two deployables:
#   1. webhook_receiver  -> Cloud Run service
#   2. state DDL          -> applied to BigQuery (one-time / idempotent)
# Agent itself is registered in Agent Builder (manual or via gcloud) — TODO.

steps:
  # 1. Apply state-store DDL (idempotent: CREATE TABLE IF NOT EXISTS)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: apply-ddl
    entrypoint: bash
    args:
      - -c
      - |
        for f in state/ddl/*.sql; do
          bq query --use_legacy_sql=false < "$f"
        done

  # 2. Build + deploy the webhook receiver
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-webhook
    args:
      - run
      - deploy
      - fivetran-sync-end-receiver
      - --source=ingest/webhook_receiver
      - --region=${_REGION}
      - --no-allow-unauthenticated   # Fivetran calls with a signed payload; lock down + verify HMAC
      # TODO: wire env vars / secret manager references

substitutions:
  _REGION: us-central1

# TODO: step 3 — register/update the Agent Builder agent (agent/agent_config.yaml)
